{% extends "base.html" %}

{% block title %}Forgot Password - ACCIO HUB PM{% endblock %}

{% block content %}
<div class="fixed inset-0 flex items-center justify-center bg-slate-50 dark:bg-navy-900 z-[1001]">
    <!-- Higher z-index to cover sidebar -->
    <div class="w-full max-w-md p-8 bg-white dark:bg-navy-800 rounded-2xl shadow-xl border border-slate-100 dark:border-navy-700 relative">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-navy-600 to-gold-500 mb-2">
                ACCIO HUB</h1>
            <p class="text-slate-500 dark:text-slate-400">Reset your password</p>
        </div>

        <div class="space-y-4">
            <p class="text-sm text-slate-600 dark:text-slate-300">
                Enter your email address and we'll send you a link to reset your password.
            </p>
            <div class="space-y-3">
                <input type="email" id="email" placeholder="Email address"
                    class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-navy-500 outline-none">
                
                <button onclick="sendResetLink()"
                    class="w-full px-4 py-3 bg-navy-600 hover:bg-navy-700 text-white font-medium rounded-xl transition-all shadow-lg shadow-navy-500/30">
                    Send Reset Link
                </button>
            </div>
        </div>

        <p class="mt-8 text-center text-sm text-slate-500 dark:text-slate-400">
            Remember your password? <a href="/auth/login" class="text-navy-600 hover:text-navy-800 dark:text-gold-500 font-medium">Log in</a>
        </p>
    </div>
</div>

<script>
    // The supabase client is initialized in base.html as 'supabaseClient'

    async function sendResetLink() {
        const email = document.getElementById('email').value;
        const btn = event.target;

        if (!email) {
            showToast("Please enter your email", "error");
            return;
        }

        btn.innerText = "Sending...";
        btn.disabled = true;

        try {
            const { data, error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/auth/reset-password',
            });

            if (error) throw error;
            
            showToast("Password reset link sent! Check your email.", "success");
            btn.innerText = "Link Sent";

        } catch (error) {
            showToast(error.message || "Failed to send reset link", "error");
            btn.innerText = "Send Reset Link";
            btn.disabled = false;
        }
    }
</script>
{% endblock %}
